version: '3.8'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "3001"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=3001
    restart: unless-stopped

volumes:
  uploads_data:
